seed: 42

# Models (same structure as humanoid but smaller networks for smaller robot)
models:
  separate: True
  policy:
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: -2.9  # Very deterministic start (same as humanoid)
    fixed_log_std: True
    network:
      - name: net
        input: OBSERVATIONS
        layers: [512, 256]  # Smaller than humanoid [1024, 512]
        activations: relu
    output: ACTIONS
  
  value:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [512, 256]  # Match policy size
        activations: relu
    output: ONE
  
  discriminator:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [1024, 512, 256]  # Keep large for good discrimination
        activations: relu
    output: ONE

# Memories
memory:
  class: RandomMemory
  memory_size: -1  # Auto (same as rollouts)

motion_dataset:
  class: RandomMemory
  memory_size: 200000  # Same as humanoid

reply_buffer:
  class: RandomMemory
  memory_size: 1000000  # Same as humanoid

# AMP Agent
agent:
  class: AMP
  rollouts: 16
  learning_epochs: 6
  mini_batches: 2
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 5.0e-05
  learning_rate_scheduler: null
  learning_rate_scheduler_kwargs: null
  
  # Preprocessors
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  amp_state_preprocessor: RunningStandardScaler
  amp_state_preprocessor_kwargs: null
  
  # Training
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 0.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True
  
  # Loss scales
  entropy_loss_scale: 0.0
  value_loss_scale: 2.5
  discriminator_loss_scale: 5.0
  
  # AMP specific
  amp_batch_size: 512
  task_reward_weight: 0.0  # Pure AMP - no task reward!
  style_reward_weight: 1.0
  discriminator_batch_size: 4096
  discriminator_reward_scale: 2.0
  discriminator_logit_regularization_scale: 0.05
  discriminator_gradient_penalty_scale: 5.0
  discriminator_weight_decay_scale: 1.0e-04
  
  time_limit_bootstrap: False
  
  # Logging
  experiment:
    directory: "dextra_amp_walk"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto

# Trainer
trainer:
  class: SequentialTrainer
  #timesteps: 100000
  timesteps: 80000 
  #timesteps: 240000
  environment_info: log