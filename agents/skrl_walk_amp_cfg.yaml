seed: 42

models:
  separate: True
  policy:
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: -1.0        # ✅ -1.0 → -1.5 (덜 랜덤)
    fixed_log_std: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [512, 256, 128]         # ✅ [512,256,128] → [256,128] (단순화)
        activations: elu
    output: ACTIONS
  value:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [512, 256, 128]
        activations: elu
    output: ONE
  discriminator:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [512, 256, 128]
        activations: elu
    output: ONE

memory:
  class: RandomMemory
  memory_size: -1

motion_dataset:
  class: RandomMemory
  memory_size: 50000

reply_buffer:
  class: RandomMemory
  memory_size: 200000

agent:
  class: AMP
  rollouts: 16
  learning_epochs: 5
  mini_batches: 2
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 1.0e-4          # ✅ 1e-4 → 5e-5 (안정성)
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.016
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  amp_state_preprocessor: RunningStandardScaler
  amp_state_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True
  entropy_loss_scale: 0.02
  value_loss_scale: 1.0
  discriminator_loss_scale: 7.5
  amp_batch_size: 512
  task_reward_weight: 0.1
  style_reward_weight: 0.9
  discriminator_batch_size: 2048
  discriminator_reward_scale: 2
  discriminator_logit_regularization_scale: 0.05
  discriminator_gradient_penalty_scale: 5.0
  discriminator_weight_decay_scale: 1.0e-4
  time_limit_bootstrap: False
  experiment:
    directory: "dextra_amp_walk"
    experiment_name: ""
    write_interval: 100
    checkpoint_interval: 500

trainer:
  class: SequentialTrainer
  timesteps: 200000              
  environment_info: log